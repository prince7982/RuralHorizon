<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Dashboard - Rural Horizon</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f7f6;
        margin: 0;
        display: flex;
      }
      .sidebar {
        width: 250px;
        background: #39c3c8;
        /* background: #ff9800; */
        height: 100vh;
        color: white;
        padding: 20px;
        position: fixed;
      }
      .sidebar h3 {
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        padding-bottom: 15px;
        margin-bottom: 20px;
      }
      .sidebar p {
        margin: 15px 0;
        cursor: pointer;
        transition: 0.3s;
        padding: 8px;
        border-radius: 5px;
      }
      .sidebar p:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .main-content {
        margin-left: 290px;
        padding: 40px;
        width: 100%;
      }
      .profile-card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        text-align: center;
      }

      .profile-img-container img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 4px solid #ff9800;
        background: #fff;
        object-fit: cover;
      }
      .user-info h2 {
        color: #d35400;
        border-bottom: 2px solid #ff9800;
        padding-bottom: 10px;
        margin-top: 10px;
      }
      .info-list {
        text-align: left;
        margin-top: 20px;
      }
      .info-item {
        margin: 15px 0;
        font-size: 1.1rem;
        color: #333;
      }
      .info-item i {
        color: #ff9800;
        margin-right: 10px;
        width: 20px;
      }

      .logout-btn {
        background: #ff3333;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 20px;
        width: 100%;
        font-weight: bold;
      }
      
      .edit-btn {
        background: #ff9800;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 15px;
        font-weight: bold;
      }
      
      .loading {
        text-align: center;
        padding: 20px;
        font-size: 1.2rem;
        color: #ff9800;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h3>Rural Horizon</h3>
      <p onclick="window.location.href = '/index.html'">
        <i class="fas fa-arrow-left"></i> Back to Home
      </p>
      <hr style="opacity: 0.3" />
      <p><i class="fas fa-user-circle"></i> Dashboard</p>
      <p onclick="window.location.href = '/Resourses/resource.html'">
        <i class="fas fa-file-alt"></i> Courses
      </p>
      <p><i class="fas fa-poll"></i> My Activity</p>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="main-content">
      <div class="profile-card" id="profileCard">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i> Loading profile...
        </div>
      </div>
    </div>

    <script>
      netlifyIdentity.init();
      
      // Function to get user data from localStorage or API
      async function getUserData(user) {
        return new Promise((resolve) => {
          // Try to get additional user data from app_metadata or user_metadata
          const userData = {
            name: user.user_metadata?.full_name || user.email?.split('@')[0] || "User",
            email: user.email || "Not Provided",
            contact: user.user_metadata?.contact_number || 
                     user.user_metadata?.phone || 
                     "Not Provided",
            memberId: user.id?.substring(0, 8).toUpperCase() || "XXXXXX",
            avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(user.email || user.id)}`
          };
          
          // Try to get saved profile data from localStorage
          const savedProfile = localStorage.getItem(`profile_${user.id}`);
          if (savedProfile) {
            const profile = JSON.parse(savedProfile);
            userData.name = profile.name || userData.name;
            userData.contact = profile.contact || userData.contact;
            if (profile.avatar) userData.avatar = profile.avatar;
          }
          
          resolve(userData);
        });
      }
      
      // Function to display user profile
      async function displayUserProfile(user) {
        const userData = await getUserData(user);
        
        const profileHTML = `
          <div class="profile-img-container">
            <img id="userAvatar" src="${userData.avatar}" alt="Profile" />
          </div>
          <div class="user-info">
            <h2>Welcome, <span id="dashName">${escapeHtml(userData.name)}</span>!</h2>
            <div class="info-list">
              <div class="info-item">
                <i class="fas fa-envelope"></i> <strong>Email:</strong>
                <span id="dashEmail">${escapeHtml(userData.email)}</span>
              </div>
              <div class="info-item">
                <i class="fas fa-phone"></i> <strong>Contact:</strong>
                <span id="dashContact">${escapeHtml(userData.contact)}</span>
                <button class="edit-btn" onclick="editContact()" style="margin-left: 10px; padding: 2px 10px; font-size: 0.8rem;">
                  <i class="fas fa-edit"></i> Edit
                </button>
              </div>
              <div class="info-item">
                <i class="fas fa-id-badge"></i> <strong>Member ID:</strong>
                <span id="dashID">${escapeHtml(userData.memberId)}</span>
              </div>
            </div>
          </div>
        `;
        
        document.getElementById("profileCard").innerHTML = profileHTML;
        
        // Store user data for later use
        window.currentUser = user;
        window.currentUserData = userData;
      }
      
      // Escape HTML to prevent XSS
      function escapeHtml(str) {
        if (!str) return '';
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
      
      // Function to edit contact number
      function editContact() {
        const currentContact = document.getElementById("dashContact").innerText;
        const newContact = prompt("Enter your contact number:", currentContact === "Not Provided" ? "" : currentContact);
        
        if (newContact && newContact.trim()) {
          // Update display
          document.getElementById("dashContact").innerText = newContact;
          
          // Save to localStorage
          if (window.currentUser) {
            const savedProfile = localStorage.getItem(`profile_${window.currentUser.id}`) || '{}';
            const profile = JSON.parse(savedProfile);
            profile.contact = newContact;
            localStorage.setItem(`profile_${window.currentUser.id}`, JSON.stringify(profile));
            
            // Show success message
            alert("Contact number updated successfully!");
          }
        }
      }
      
      // Make editContact function global
      window.editContact = editContact;
      
      // Handle user authentication
      netlifyIdentity.on("init", (user) => {
        if (!user) {
          // window.location.href = "/Bootstrap/login.html";
          window.location.href = "/index.html";
        } else {
          displayUserProfile(user);
        }
      });
      
      // Also handle case where user is already logged in when page loads
      const currentUser = netlifyIdentity.currentUser();
      if (currentUser) {
        displayUserProfile(currentUser);
      } else {
        netlifyIdentity.on("login", (user) => {
          displayUserProfile(user);
        });
      }
      
      function logout() {
        netlifyIdentity.logout();
      }
      
      netlifyIdentity.on("logout", () => {
        window.location.href = "/index.html";
      });
    </script>
  </body>
</html>
