<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Dashboard</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    @import url('../navbar.css');
    @import url('./login.css');
    @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css');
    .hidden { display: none; }
    
    /* Google Button Styling */
    .auth-google-btn {
      background: white;
      color: #444;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 5px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }
    .auth-google-btn:hover { background: #f1f1f1; }
    .auth-divider { text-align: center; margin: 15px 0; color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div id="loader" class="loader">
      <div class="spinner"></div>
  </div>

<div id="navbar-container"></div> <!-- Navbar will be loaded here -->

<!-- ✅ UNIQUE WRAPPER -->
<div class="student-auth">
  <div class="auth-container">

    <!-- LEFT PANEL -->
    <div class="auth-left">
      <img src="../assets/logo2.png" class="auth-logo" />

      <p class="auth-desc">
        By signing up, you can avail of lots of benefits:
      </p>

      <ul class="auth-list">
        <li>Career guidance after 10th and 12th.</li>
        <li>Government exams and schemes.</li>
        <li>Quizzes for Brushup your Knowledge.</li>
        <li>Find top universities/colleges.</li>
        <li>Connect with expert instructors.</li>
      </ul>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <h2 id="authTitle">Sign In</h2>

      <form id="authForm">

        <div id="authExtraFields" class="hidden">
          <input type="text" id="authName" placeholder="Enter Full Name">
          <input type="tel" id="authPhone" placeholder="Enter Contact Number">
        </div>

        <input type="email" id="authEmail" placeholder="Enter Your Email" required>

        <div class="auth-input-group">
          <input type="password" id="authPassword" placeholder="Enter Your Password" required>
          <i class="fas fa-eye" onclick="togglePassword('authPassword', this)"></i>
        </div>

        <div id="authConfirmBox" class="auth-input-group hidden">
          <input type="password" id="authConfirmPassword" placeholder="Enter Confirm Password">
          <i class="fas fa-eye" onclick="togglePassword('authConfirmPassword', this)"></i>
        </div>

        <button type="submit" id="authBtn">Sign In</button>

      </form>

      <div class="auth-divider">OR</div>

      <button class="auth-google-btn" id="authGoogleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
        Continue with Google
      </button>

      <p id="authToggleText">
        Don't have an account? 
        <span onclick="toggleForm()">Sign up</span>
      </p>

    </div>

  </div>
</div>
<!-- END student-auth -->

<div id="footer-container"></div> <!-- Footer will be loaded here -->
<script src="../navbar.js" defer></script>
<script src="./login.js"></script>
<!-- <script src="/Bootstrap/login.js"></script> -->


<script defer>

    // 1. Netlify Identity ko initialize karein
    netlifyIdentity.init();

    document.addEventListener("DOMContentLoaded", () => {
        function updateUI(user) {
            const loginLi = document.getElementById('loginLi');
            const logoutLi = document.getElementById('logoutLi');
            const nameDisplay = document.getElementById('userNameDisplay');
            
            if (user) {
                // Agar user login hai, toh "Login" link ko puri tarah hide karo
                if(loginLi) {
                    loginLi.setAttribute('style', 'display: none !important');
                }
                
                // Logout section aur Dashboard link dikhao
                if(logoutLi) {
                    logoutLi.style.display = 'flex';
                    logoutLi.style.alignItems = 'center';
                }

                // User icon aur Dashboard link Navbar mein set karein
                if(nameDisplay) {
                    nameDisplay.innerHTML = `
                        <a href="/dashboard.html" title="Go to Dashboard" style="color: #ff9800; font-size: 1.1rem; text-decoration: none; margin-right: 15px; font-weight: bold;">
                            <i class="fas fa-user-circle"></i> Dashboard
                        </a>`;
                }
            } else {
                // Agar user logout hai, toh wapas "Login" button dikhao
                if(loginLi) {
                    loginLi.style.display = 'block';
                }
                // Logout section hide karo
                if(logoutLi) {
                    logoutLi.style.display = 'none';
                }
            }
        }

        // Netlify Identity ke events handle karein
        netlifyIdentity.on('init', user => updateUI(user));
        
        netlifyIdentity.on('login', user => {
            updateUI(user);
            netlifyIdentity.close();
            // Login hote hi seedha dashboard par bhejein
            window.location.href = "/dashboard.html";
        });

        netlifyIdentity.on('logout', () => {
            updateUI(null);
            // Logout hone par home page par wapas laayein
            window.location.href = "/index.html";
        });

        // Logout button par click karne par trigger karein
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            netlifyIdentity.logout();
        });

        updateUI(netlifyIdentity.currentUser());
    });
</script>
</body>
</html>
