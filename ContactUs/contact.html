<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Rural Horizon</title>
  <link rel="icon" href="../assets/logo3.png" sizes="64x64" type="image/png">
  <link rel="stylesheet" href="../navbar.css">

  <link rel="stylesheet" href="contact.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <!-- loader -->

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <div id="navbar-container"></div> <!-- Navbar will be loaded dynamically -->

<div id="ux-wrapper">

  <div class="ux-card">

    <div class="ux-header">
      <h1>Let's Talk 👋</h1>
      <p>We’d love to hear from you. Send us a message!</p>
      <p class="ux-hindi">"हमसे जुड़ें, हम जल्द ही आपसे संपर्क करेंगे।"</p>
    </div>

    <form id="ux-form">

      <div class="ux-grid">

        <div class="ux-field">
          <label>Full Name</label>
          <input type="text" id="ux-name" required>
        </div>

        <div class="ux-field">
          <label>Email Address</label>
          <input type="email" id="ux-email" required>
        </div>

        <div class="ux-field">
          <label>Phone</label>
          <input type="tel" id="ux-phone" required>
        </div>

        <div class="ux-field">
          <label>Subject</label>
          <select id="ux-subject">
            <option value="">Select</option>
            <option>General Inquiry</option>
            <option>Support</option>
            <option>Feedback</option>
          </select>
        </div>

      </div>

      <div class="ux-field">
        <label>Your Message</label>
        <textarea id="ux-message" rows="6" required></textarea>
      </div>

      <div class="ux-bottom">
        <label class="ux-check">
          <input type="checkbox" id="ux-subscribe">
          Join mailing list
        </label>

        <button type="submit" class="ux-btn">
          <i class="fa-solid fa-paper-plane"></i> Send
        </button>
      </div>

      <p id="ux-status"></p>

    </form>

  </div>
</div>

<!-- Map Integration -->
<div class="map">
      <iframe 
        src="https://www.google.com/maps?q=Noida,Uttar%20Pradesh&output=embed"
        width="100%" 
        height="335" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy">
      </iframe>
</div>
<div id="footer-container"></div> <!-- Footer will be loaded dynamically -->
<script src="../navbar.js" defer></script> <!-- Dynamic path handling -->
<script src="contact.js"></script>

</body>
</html>
